name: Update football data

on:
  schedule:
    # 07:00 UTC = 15:00 Asia/Shanghai
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update match data
        run: npm run update-data -- --source espn --date today --league fifa.world || npm run update-data

      - name: Verify build
        run: npm run build

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/matches.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update football match data"
            git push
          fi
